<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANSTAR – Сучасний аніме‑плеєр</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --accent: #ff5e5e;
            --accent-glow: rgba(255, 94, 94, 0.3);
            --glass-bg: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --gradient: linear-gradient(135deg, #1f1f1f 0%, #0a0a0a 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            background-image: radial-gradient(circle at 20% 30%, #1a1a1a 0%, #0a0a0a 70%);
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--accent), #ff8c42);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 6px;
            flex: 1;
            max-width: 600px;
        }

        .search-box input {
            background: transparent;
            border: none;
            padding: 12px 16px;
            font-size: 1rem;
            color: var(--text-primary);
            flex: 1;
            outline: none;
        }

        .search-box button {
            background: var(--accent);
            border: none;
            border-radius: 8px;
            padding: 12px 24px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .search-box button:hover {
            background: #ff7b7b;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .results-title {
            font-size: 1.4rem;
            margin: 20px 0 10px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .anime-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .anime-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(255, 94, 94, 0.2);
            border-color: var(--accent);
        }

        .anime-card .title {
            font-weight: 600;
            font-size: 1.1rem;
            line-height: 1.3;
        }

        .anime-card .type-badge {
            align-self: flex-start;
            background: rgba(255, 94, 94, 0.15);
            color: var(--accent);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .episodes-panel {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid var(--border);
            backdrop-filter: blur(5px);
        }

        .anime-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .episode-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .episode-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 100px;
            text-align: center;
        }

        .episode-item:hover, .episode-item.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .quality-selector {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .quality-selector select {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .player-wrapper {
            margin-top: 20px;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 16/9;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: var(--accent);
        }

        .hidden {
            display: none;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">ANSTAR</div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Назва аніме..." autofocus>
                <button onclick="search()"><i class="fa fa-search"></i> Пошук</button>
            </div>
        </div>

        <div id="resultsSection" class="hidden">
            <div class="results-title">Результати пошуку</div>
            <div id="resultsGrid" class="anime-grid"></div>
        </div>

        <div id="animeSection" class="hidden">
            <div class="episodes-panel">
                <div class="anime-header">
                    <button class="back-button" onclick="backToResults()"><i class="fa fa-arrow-left"></i></button>
                    <span id="animeTitle">Назва</span>
                </div>
                <div class="episode-list" id="episodeList"></div>
                <div class="quality-selector">
                    <label>Якість:</label>
                    <select id="qualitySelect">
                        <option value="">Авто</option>
                        <option value="360p">360p</option>
                        <option value="480p">480p</option>
                        <option value="720p">720p</option>
                        <option value="1080p">1080p</option>
                    </select>
                </div>
            </div>

            <div class="player-wrapper" id="playerWrapper">
                <video id="videoPlayer" controls></video>
                <div id="loadingMessage" class="loading hidden">
                    <i class="fa fa-spinner fa-spin"></i> Завантаження відео...
                </div>
            </div>
        </div>
    </div>

    <script>
        // === Конфігурація проксі ===
        // Для локальної роботи використовуйте localhost:3001
        // Для публічного доступу замініть на URL вашого проксі на Render
        const PROXY_URL = 'http://localhost:3001/proxy?url=';

        let currentAnimeUrl = '';
        let currentEpisodes = [];
        let currentEpisodeTitle = '';
        let currentPlayerUrl = '';

        function show(id) { document.getElementById(id).classList.remove('hidden'); }
        function hide(id) { document.getElementById(id).classList.add('hidden'); }

        function showLoading(show = true) {
            const el = document.getElementById('loadingMessage');
            el.classList.toggle('hidden', !show);
        }

        async function fetchHTML(url) {
            const response = await fetch(PROXY_URL + encodeURIComponent(url));
            if (!response.ok) throw new Error(`Помилка завантаження: ${response.status}`);
            return response.text();
        }

        function parseHTML(html) {
            const parser = new DOMParser();
            return parser.parseFromString(html, 'text/html');
        }

        async function search() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return alert('Введіть назву');
            hide('animeSection');
            show('resultsSection');
            document.getElementById('resultsGrid').innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin"></i> Пошук...</div>';

            try {
                const searchUrl = `https://anitube.in.ua/index.php?do=search&subaction=search&story=${encodeURIComponent(query)}`;
                const html = await fetchHTML(searchUrl);
                const doc = parseHTML(html);
                const items = doc.querySelectorAll('.short-film .short-film__title a');

                let results = '';
                if (items.length === 0) {
                    results = '<div style="color:#888; padding:20px;">Нічого не знайдено</div>';
                } else {
                    items.forEach(a => {
                        const title = a.textContent.trim();
                        const link = a.href;
                        const typeDiv = a.closest('.short-film')?.querySelector('.short-film__label');
                        const type = typeDiv ? typeDiv.textContent.trim() : 'N/A';
                        results += `
                            <div class="anime-card" onclick="selectAnime('${encodeURIComponent(link)}', '${escapeHtml(title)}')">
                                <div class="title">${escapeHtml(title)}</div>
                                <span class="type-badge">${type}</span>
                            </div>`;
                    });
                }
                document.getElementById('resultsGrid').innerHTML = results;
            } catch (err) {
                document.getElementById('resultsGrid').innerHTML = `<div style="color:red;">Помилка: ${err.message}. Перевірте проксі.</div>`;
            }
        }

        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function selectAnime(encodedUrl, title) {
            currentAnimeUrl = decodeURIComponent(encodedUrl);
            document.getElementById('animeTitle').textContent = title;
            hide('resultsSection');
            show('animeSection');
            document.getElementById('episodeList').innerHTML = '<div class="loading"><i class="fa fa-spinner fa-spin"></i> Завантаження серій...</div>';
            document.getElementById('videoPlayer').src = '';
            showLoading(false);

            try {
                const html = await fetchHTML(currentAnimeUrl);
                const doc = parseHTML(html);
                const newsId = extractNewsId(currentAnimeUrl);
                const userHash = extractUserHash(doc);

                const apiResponse = await fetch(`${PROXY_URL}${encodeURIComponent(`https://anitube.in.ua/engine/ajax/playlists.php?news_id=${newsId}&xfield=playlist&user_hash=${userHash}`)}`);
                const json = await apiResponse.json();
                if (json.success === false) throw new Error('Помилка отримання плейлиста');
                const episodes = parsePlaylist(json.response);
                currentEpisodes = episodes;
                renderEpisodes(episodes);
            } catch (err) {
                document.getElementById('episodeList').innerHTML = `<div style="color:red;">Помилка: ${err.message}</div>`;
            }
        }

        function extractNewsId(url) {
            const match = url.match(/\/(\d+)-/);
            return match ? match[1] : null;
        }

        function extractUserHash(doc) {
            const scripts = doc.querySelectorAll('script');
            for (const script of scripts) {
                const match = script.textContent.match(/var dle_login_hash\s*=\s*'([^']+)'/);
                if (match) return match[1];
            }
            return '';
        }

        function parsePlaylist(html) {
            const episodes = [];
            const regex = /<li data-file="([^"]+)" data-id="([^"]*)">(.*?)<\/li>/g;
            let match;
            const seen = new Set();
            while ((match = regex.exec(html)) !== null) {
                const playerUrl = match[1].replace(/&amp;/g, '&');
                const title = match[3].trim();
                if (!seen.has(title)) {
                    seen.add(title);
                    episodes.push({ title, playerUrl });
                }
            }
            episodes.sort((a, b) => {
                const numA = parseInt(a.title) || 0;
                const numB = parseInt(b.title) || 0;
                return numA - numB;
            });
            return episodes;
        }

        function renderEpisodes(episodes) {
            const container = document.getElementById('episodeList');
            if (episodes.length === 0) {
                container.innerHTML = '<div style="color:#888;">Серії не знайдено</div>';
                return;
            }
            container.innerHTML = episodes.map((ep, idx) => 
                `<div class="episode-item" onclick="playEpisode('${escapeHtml(ep.title)}', '${encodeURIComponent(ep.playerUrl)}')">${escapeHtml(ep.title)}</div>`
            ).join('');
        }

        async function playEpisode(title, encodedPlayerUrl) {
            currentEpisodeTitle = title;
            currentPlayerUrl = decodeURIComponent(encodedPlayerUrl);
            const quality = document.getElementById('qualitySelect').value;

            document.querySelectorAll('.episode-item').forEach(el => {
                el.classList.toggle('active', el.textContent.trim() === title);
            });

            showLoading(true);
            try {
                const videoUrl = await extractEpisodeUrl(currentPlayerUrl, quality);
                if (!videoUrl) throw new Error('Не вдалося отримати посилання на відео');
                initPlayer(videoUrl);
            } catch (err) {
                alert(`Помилка: ${err.message}`);
                showLoading(false);
            }
        }

        async function extractEpisodeUrl(playerUrl, quality) {
            const html = await fetchHTML(playerUrl);
            const doc = parseHTML(html);
            
            const scripts = doc.querySelectorAll('script');
            let allMatches = '';
            scripts.forEach(s => { allMatches += s.textContent + '\n'; });

            let qualityUrls = {};
            const qualityRegex = /\[(\d+p)\]([^,\s]+)/g;
            let match;
            while ((match = qualityRegex.exec(allMatches)) !== null) {
                qualityUrls[match[1]] = match[2];
            }

            if (Object.keys(qualityUrls).length === 0) {
                const simpleMatch = allMatches.match(/file:\s*['"]([^'"]+)['"]/) || 
                                   allMatches.match(/src:\s*['"]([^'"]+\.m3u8[^'"]*)['"]/);
                if (simpleMatch) return simpleMatch[1];
            }

            if (quality && qualityUrls[quality]) return qualityUrls[quality];
            const keys = Object.keys(qualityUrls);
            if (keys.length > 0) {
                keys.sort((a, b) => parseInt(b) - parseInt(a));
                return qualityUrls[keys[0]];
            }
            return null;
        }

        function initPlayer(videoUrl) {
            const video = document.getElementById('videoPlayer');
            showLoading(false);

            if (videoUrl.endsWith('.m3u8')) {
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(videoUrl);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = videoUrl;
                } else {
                    alert('Ваш браузер не підтримує HLS. Спробуйте інший плеєр.');
                }
            } else {
                video.src = videoUrl;
            }
        }

        function backToResults() {
            hide('animeSection');
            show('resultsSection');
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
